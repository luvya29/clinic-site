<script>
async function loadPatients() {
  try {
    console.log("Fetching patients...");

    const res = await fetch("https://clinic-site-ysbc.onrender.com");
    console.log("Response status:", res.status);

    if (!res.ok) {
      console.error("Failed to fetch patients data:", res.statusText);
      return;
    }

    const data = await res.json();
    console.log("Patients data:", data);

    const table = document.querySelector("#patientsTable tbody");
    table.innerHTML = ""; // Clear existing rows

    data.forEach(p => {
      const row = `
        <tr>
          <td>${p.name}</td>
          <td>${p.treatment}</td>
          <td>${p.total_amount}</td>
          <td>${p.paid_amount}</td>
          <td>${p.balance}</td>
        </tr>
      `;
      table.innerHTML += row;
    });
    console.log("Table updated with patients.");
  } catch (error) {
    console.error("Error loading patients:", error);
  }
}

// Call it when the page loads
loadPatients();
</script>
